<!DOCTYPE html>
<html>
<head>
    <title>Clean Wrapper</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        /* The Iframe is the window to the other site */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* This button stays on top so you can always see it */
        #fix-btn {
            position: absolute; bottom: 10px; right: 10px;
            padding: 10px; background: orange; color: black;
            border-radius: 5px; cursor: pointer; z-index: 9999;
            font-family: sans-serif; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="fix-btn" onclick="cleanPage()">FORCE CLEAN</div>
    
    <iframe id="stream-frame" src=""></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const streamUrl = urlParams.get('url');
        const frame = document.getElementById('stream-frame');

        if (streamUrl) {
            frame.src = streamUrl;
        } else {
            alert("Add ?url=https://site.com to your address bar");
        }

        function cleanPage() {
            // This is a "Hail Mary" for Tizen browsers
            // It tries to pull the video to the very front of the iframe
            console.log("Attempting to bypass overlays...");
            frame.style.pointerEvents = "auto";
        }
    </script>
</body>
</html>
