<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jio Star 1 Live</title>
    <!-- The engine that runs the video -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: lime; font-family: sans-serif; }
        #video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #overlay { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.7); padding: 10px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">Status: Initializing...</div>
    <video id="video" controls autoplay></video>

    <script>
        const status = document.getElementById('overlay');

        async function startStream() {
            const video = document.getElementById('video');
            const player = new shaka.Player(video);

            // Configure the DRM keys you found
            player.configure({
                drm: {
                    clearKeys: {
                        '965dc2ddb1d85138ad787999a7f30ca5': '859695076e67fe961836b564db6d689c'
                    }
                }
            });

            // The Jio TV Manifest URL
            const manifest = "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_BTS/WDVLive/index.mpd";

            try {
                status.innerText = "Connecting to Jio CDN...";
                await player.load(manifest);
                status.innerText = "Streaming Active";
                setTimeout(() => { status.style.display = 'none'; }, 5000);
            } catch (error) {
                status.innerText = "Error: " + error.code;
                console.error("Shaka Error:", error);
            }
        }

        // Run when page is ready
        document.addEventListener('DOMContentLoaded', () => {
            if (shaka.Player.isBrowserSupported()) {
                startStream();
            } else {
                status.innerText = "Error: Browser not supported";
            }
        });
    </script>
</body>
</html>
