<!DOCTYPE html>
<html>
<head>
    <title>Stream Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; overflow: hidden; }
        #video { width: 100%; height: 100%; }
        #status { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; font-family: monospace; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

    <div id="status">Status: Loading Shaka...</div>
    <video id="video" controls autoplay></video>

    <script>
        const status = document.getElementById('status');
        
        async function initPlayer() {
            const video = document.getElementById('video');
            const player = new shaka.Player(video);

            // 1. Configure the Keys
            player.configure({
                drm: {
                    clearKeys: {
                        '965dc2ddb1d85138ad787999a7f30ca5': '859695076e67fe961836b564db6d689c'
                    }
                }
            });

            // 2. Add the Headers (Crucial for Jio)
            player.getNetworkingEngine().registerRequestFilter(function(type, request) {
                request.headers['User-Agent'] = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36';
            });

            const url = "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_BTS/WDVLive/index.mpd";

            try {
                status.innerText = "Status: Connecting to Jio...";
                await player.load(url);
                status.innerText = "Status: Playing!";
                // Hide status after 5 seconds of success
                setTimeout(() => status.style.display = 'none', 5000);
            } catch (e) {
                status.innerText = "Error: " + e.code + " (Check Keys or Jio Block)";
                console.error(e);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (shaka.Player.isBrowserSupported()) {
                initPlayer();
            } else {
                status.innerText = "Error: Browser Not Supported";
            }
        });
    </script>
</body>
</html>
